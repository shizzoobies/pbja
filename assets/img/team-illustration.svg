<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#FBF3EC"/>
      <stop offset="100%" stop-color="#E6D0BB"/>
    </radialGradient>
    <clipPath id="c"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

  <!-- Subtle ledger lines -->
  <g clip-path="url(#c)" opacity=".07" stroke="#2C3D5A" stroke-width=".75" fill="none">
    <line x1="0" y1="44"  x2="200" y2="44"/>
    <line x1="0" y1="88"  x2="200" y2="88"/>
    <line x1="0" y1="132" x2="200" y2="132"/>
    <line x1="0" y1="176" x2="200" y2="176"/>
    <line x1="40"  y1="0" x2="40"  y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
  </g>

  <!-- ── Left figure (navy) ── -->
  <!-- Head -->
  <circle cx="60" cy="77" r="15" fill="#2C3D5A"/>
  <!-- Subtle ear highlight -->
  <circle cx="60" cy="77" r="11" fill="#2C3D5A" opacity=".0"/>
  <!-- Body -->
  <rect x="46" y="95" width="28" height="34" rx="10" fill="#2C3D5A"/>
  <!-- Collar line -->
  <path d="M57 95 L60 102 L63 95" fill="none" stroke="#FAF8F4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity=".35"/>

  <!-- ── Right figure (pink/rose) ── -->
  <circle cx="140" cy="77" r="15" fill="#B5687A"/>
  <rect x="126" y="95" width="28" height="34" rx="10" fill="#B5687A"/>
  <path d="M137 95 L140 102 L143 95" fill="none" stroke="#FAF8F4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity=".35"/>

  <!-- ── Center figure (accent/lead — slightly taller) ── -->
  <circle cx="100" cy="64" r="19" fill="#C4896A"/>
  <rect x="83" y="86" width="34" height="42" rx="12" fill="#C4896A"/>
  <!-- Collar -->
  <path d="M97 86 L100 95 L103 86" fill="none" stroke="#FAF8F4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity=".4"/>
  <!-- Small badge / star indicating lead -->
  <circle cx="117" cy="60" r="9" fill="#FAF8F4" opacity=".92"/>
  <path d="M117 54.5 l1.5 3.2 3.5.5-2.5 2.4.6 3.5-3.1-1.7-3.1 1.7.6-3.5-2.5-2.4 3.5-.5z"
        fill="#C4896A"/>

  <!-- ── Chart section ── -->
  <!-- Axis line -->
  <line x1="26" y1="169" x2="174" y2="169" stroke="#2C3D5A" stroke-width="1" opacity=".18"/>

  <!-- Rising bars — navy / accent / pink alternating -->
  <rect x="28"  y="157" width="9" height="12" rx="2" fill="#2C3D5A"  opacity=".40"/>
  <rect x="41"  y="152" width="9" height="17" rx="2" fill="#C4896A"  opacity=".50"/>
  <rect x="54"  y="155" width="9" height="14" rx="2" fill="#B5687A"  opacity=".42"/>
  <rect x="67"  y="148" width="9" height="21" rx="2" fill="#2C3D5A"  opacity=".52"/>
  <rect x="80"  y="144" width="9" height="25" rx="2" fill="#C4896A"  opacity=".58"/>
  <rect x="93"  y="140" width="9" height="29" rx="2" fill="#B5687A"  opacity=".52"/>
  <rect x="106" y="135" width="9" height="34" rx="2" fill="#2C3D5A"  opacity=".58"/>
  <rect x="119" y="129" width="9" height="40" rx="2" fill="#C4896A"  opacity=".68"/>
  <rect x="132" y="122" width="9" height="47" rx="2" fill="#B5687A"  opacity=".60"/>
  <rect x="154" y="114" width="12" height="55" rx="2" fill="#2C3D5A" opacity=".72"/>

  <!-- Trend line -->
  <polyline
    points="32.5,154 45.5,149 58.5,152 71.5,145 84.5,141 97.5,137 110.5,132 123.5,126 136.5,119 160,111"
    fill="none" stroke="#C4896A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- End dot on trend line -->
  <circle cx="160" cy="111" r="4.5" fill="#C4896A"/>
  <circle cx="160" cy="111" r="2.5" fill="#FAF8F4"/>
</svg>
